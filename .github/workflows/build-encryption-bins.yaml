name: Build release encryption bins

permissions:
  id-token: write
  contents: read
  packages: write

env:
  ENCRYPTION_BINS_IMAGE: ghcr.io/accelerate-data/providers-vibedata/encryption-bins

on:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  encryption-bins-build:
    runs-on: depot-ubuntu-22.04
    concurrency:
      group: oss-encryption-bins-build
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker image
        uses: depot/build-push-action@v1
        id: build-and-push
        with:
          project: bbqjs4tj1g
          context: .
          push: true
          pull: true
          target: encryption-bins
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ github.ref_type == 'tag' && format('{0}:{1}', env.ENCRYPTION_BINS_IMAGE, github.ref_name) || format('{0}:latest', env.ENCRYPTION_BINS_IMAGE) }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.8.1
        with:
          cosign-release: "v2.4.3"

      - name: Sign Images
        env:
          DIGEST: ${{ steps.build-and-push.outputs.digest }}
          TAGS: ${{ github.ref_type == 'tag' && format('{0}:{1}', env.ENCRYPTION_BINS_IMAGE, github.ref_name) || format('{0}:latest', env.ENCRYPTION_BINS_IMAGE) }}
        run: |
          images=""
          for tag in ${TAGS}; do
            images+="${tag}@${DIGEST} "
          done
          cosign sign --yes ${images}
